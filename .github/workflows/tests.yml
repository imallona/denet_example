name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: snakemake
          create-args: python=3.12 snakemake
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: dry-run baseline
        run: |
          snakemake \
            --config use_denet=false outdir=results_baseline dup_fraction=0.2 \
            --dry-run \
            --nolock \
            --cores 4

  integration-baseline:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: snakemake
          create-args: python=3.12 snakemake
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: cache conda environments
        uses: actions/cache@v4
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ hashFiles('envs/genome_tools.yaml') }}

      - name: run baseline pipeline
        run: |
          snakemake \
            --config use_denet=false outdir=results_baseline n_reads=10000 n_chromosomes=2 chr_length=100000 benchmark_repeats=3 dup_fraction=0.2 \
            --use-conda \
            --nolock \
            --rerun-incomplete \
            --cores 4

      - name: upload benchmarks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-outputs
          path: |
            results_baseline/logs/
            results_baseline/benchmarks/
            .snakemake/log/
          if-no-files-found: ignore

  integration-denet:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: snakemake
          create-args: python=3.12 snakemake
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: cache conda environments
        uses: actions/cache@v4
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ hashFiles('envs/genome_tools.yaml') }}

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/denet
          key: cargo-denet-${{ runner.os }}

      - name: install denet
        run: |
          which denet || cargo install denet
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: run denet pipeline
        run: |
          snakemake \
            --config use_denet=true outdir=results_denet n_reads=10000 n_chromosomes=2 chr_length=100000 benchmark_repeats=3 dup_fraction=0.2 \
            --use-conda \
            --nolock \
            --rerun-incomplete \
            --cores 4

      - name: upload benchmarks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: denet-outputs
          path: |
            results_denet/logs/
            results_denet/benchmarks/
            results_denet/denet_metrics/
            .snakemake/log/
          if-no-files-found: ignore

  integration-denet-native:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: snakemake
          create-args: python=3.12 snakemake
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: cache conda environments
        uses: actions/cache@v4
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ hashFiles('envs/genome_tools.yaml') }}

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/denet
          key: cargo-denet-${{ runner.os }}

      - name: install denet
        run: |
          which denet || cargo install denet
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: run denet native pipeline
        run: |
          snakemake \
            --config use_denet_native=true outdir=results_denet_native n_reads=10000 n_chromosomes=2 chr_length=100000 benchmark_repeats=3 dup_fraction=0.2 \
            --use-conda \
            --nolock \
            --rerun-incomplete \
            --cores 4

      - name: upload benchmarks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: denet-native-outputs
          path: |
            results_denet_native/logs/
            results_denet_native/benchmarks/
            .snakemake/log/
          if-no-files-found: ignore

  render-report:
    runs-on: ubuntu-latest
    needs: [integration-baseline, integration-denet, integration-denet-native]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: snakemake
          create-args: python=3.12 snakemake
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: download baseline outputs
        uses: actions/download-artifact@v4
        with:
          name: baseline-outputs
          path: .

      - name: download denet outputs
        uses: actions/download-artifact@v4
        with:
          name: denet-outputs
          path: .

      - name: download denet native outputs
        uses: actions/download-artifact@v4
        with:
          name: denet-native-outputs
          path: .

      - name: render report
        run: |
          micromamba create -n rstats --file envs/rstats.yaml -y
          micromamba run -n rstats Rscript -e \
            "rmarkdown::render('analysis.Rmd', output_dir='figures')"

      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: figures/analysis.html
          if-no-files-found: error
